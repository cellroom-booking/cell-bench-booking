<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>细胞房超净台预约</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">细胞房超净台预约</p>
        <h1>6 个细胞台预约表</h1>
      </div>
      <div class="header-actions" aria-label="页面操作">
        <button class="ghost-button" id="copyDayButton" type="button" title="复制当前日期预约">
          <span>复制今日表</span>
        </button>
      </div>
    </header>

    <main class="app-shell">
      <section class="booking-panel" aria-labelledby="formTitle">
        <div class="panel-title">
          <h2 id="formTitle">新增预约</h2>
          <span class="storage-pill local" id="storageState">连接中</span>
        </div>

        <form id="bookingForm" class="booking-form">
          <label>
            日期
            <input id="bookingDate" name="date" type="date" required />
          </label>

          <label>
            细胞台
            <select id="benchSelect" name="bench" required></select>
          </label>

          <label>
            预约人
            <input id="personInput" name="person" type="text" placeholder="输入姓名" autocomplete="off" required />
          </label>

          <div class="time-row">
            <label>
              开始
              <input id="startTime" name="start" type="time" step="1800" min="00:00" max="23:30" value="09:00" required />
            </label>
            <label>
              使用时长
              <select id="durationSelect" name="duration" required>
                <option value="30">30 分钟</option>
                <option value="60" selected>1 小时</option>
                <option value="90">1.5 小时</option>
                <option value="120">2 小时</option>
                <option value="150">2.5 小时</option>
                <option value="180">3 小时</option>
                <option value="240">4 小时</option>
                <option value="300">5 小时</option>
                <option value="360">6 小时</option>
                <option value="480">8 小时</option>
                <option value="720">12 小时</option>
              </select>
            </label>
          </div>

          <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>

          <button class="primary-button" id="submitButton" type="submit">
            <span>添加预约</span>
          </button>
        </form>

        <div class="quick-info">
          <div>
            <span class="info-value" id="bookingCount">0</span>
            <span class="info-label">当前日期预约</span>
          </div>
          <div>
            <span class="info-value" id="freeCount">0</span>
            <span class="info-label">所选时段空闲</span>
            <span class="free-bench-list" id="freeBenchList">选择时间后显示</span>
          </div>
        </div>

        <section class="export-panel" aria-labelledby="exportTitle">
          <h2 id="exportTitle">导出记录</h2>
          <div class="export-grid">
            <label>
              开始日期
              <input id="exportStartDate" type="date" />
            </label>
            <label>
              结束日期
              <input id="exportEndDate" type="date" />
            </label>
            <label>
              开始时间
              <input id="exportStartTime" type="time" step="60" value="00:00" />
            </label>
            <label>
              结束时间
              <input id="exportEndTime" type="time" step="60" value="23:59" />
            </label>
          </div>
          <button class="ghost-button export-button" id="exportButton" type="button">
            <span>导出 Excel</span>
          </button>
          <div id="exportMessage" class="form-message" role="status" aria-live="polite"></div>
        </section>
      </section>

      <section class="schedule-panel" aria-labelledby="scheduleTitle">
        <div class="schedule-toolbar">
          <div>
            <h2 id="scheduleTitle">预约时间轴</h2>
            <p id="daySummary">按北京时间读取日期</p>
          </div>
          <div class="schedule-controls">
            <label class="date-jump">
              查看日期
              <input id="viewDate" type="date" />
            </label>
            <label class="bench-filter">
              显示范围
              <select id="benchFilter"></select>
            </label>
          </div>
        </div>

        <div class="time-axis" aria-hidden="true">
          <span>00:00</span>
          <span>03:00</span>
          <span>06:00</span>
          <span>09:00</span>
          <span>12:00</span>
          <span>15:00</span>
          <span>18:00</span>
          <span>21:00</span>
          <span>24:00</span>
        </div>

        <div id="scheduleGrid" class="schedule-grid"></div>
      </section>
    </main>

    <template id="benchTemplate">
      <article class="bench-card">
        <div class="bench-heading">
          <div>
            <h3></h3>
            <p></p>
          </div>
          <span class="bench-status"></span>
        </div>
        <div class="timeline" aria-label="预约时间轴"></div>
        <div class="booking-list"></div>
      </article>
    </template>

    <template id="bookingTemplate">
      <div class="booking-item">
        <div>
          <strong class="booking-time"></strong>
          <span class="booking-person"></span>
        </div>
        <button class="icon-button delete-booking" type="button" title="删除预约" aria-label="删除预约">
          <span aria-hidden="true">×</span>
        </button>
      </div>
    </template>

    <script src="./vendor/supabase-js-2.107.0.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
